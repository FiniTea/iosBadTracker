<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f5f5f7">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            touch-action: manipulation;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            background: #fff;
            color: #1d1d1f;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s, box-shadow 0.2s;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn .hint {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 4px;
            font-weight: 400;
        }

        .btn .cooldown {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 500;
        }

        .btn.flash-green { background: #22c55e; color: #fff; }
        .btn.flash-red { background: #ef4444; color: #fff; }
        .btn.flash-yellow { background: #eab308; color: #fff; }
        .btn.flash-brown { background: #92400e; color: #fff; }
        .btn.flash-delete { background: #94a3b8; color: #fff; }

        .main-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .main-tab {
            flex: 1;
            padding: 10px 8px;
            background: #fff;
            border: none;
            border-radius: 10px;
            color: #86868b;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            touch-action: manipulation;
        }

        .main-tab.active {
            background: #1d1d1f;
            color: #fff;
        }

        .sub-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sub-tab {
            padding: 6px 12px;
            background: #e5e5ea;
            border: none;
            border-radius: 8px;
            color: #636366;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
        }

        .sub-tab.active {
            background: #636366;
            color: #fff;
        }

        .chart-container {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 280px;
        }

        .chart-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Pie Chart */
        .pie-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .pie-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .pie-svg {
            width: 100%;
            height: 100%;
        }

        .pie-legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Bar Chart */
        .bar-chart-wrapper {
            display: flex;
            gap: 5px;
        }

        .y-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            height: 150px;
            padding-right: 8px;
            font-size: 0.65rem;
            color: #86868b;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 150px;
            flex: 1;
            gap: 4px;
            border-left: 1px solid #e5e5ea;
            padding-left: 8px;
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 45px;
        }

        .bar-pair {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 150px;
        }

        .bar {
            width: 12px;
            border-radius: 3px 3px 0 0;
            transition: height 0.3s;
            min-height: 2px;
        }

        .bar-label {
            font-size: 0.6rem;
            color: #86868b;
            margin-top: 6px;
            text-align: center;
        }

        /* Heatmap */
        .heatmap-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .heatmap-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .heatmap-nav button {
            background: #e5e5ea;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            touch-action: manipulation;
        }

        .heatmap-month {
            font-weight: 600;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .heatmap-header {
            font-size: 0.65rem;
            color: #86868b;
            text-align: center;
            padding: 4px 0;
        }

        .heatmap-day {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .heatmap-day.empty { background: transparent; }
        .heatmap-day.zero { background: #fecaca; color: #991b1b; }
        .heatmap-day.one { background: #bbf7d0; color: #166534; }
        .heatmap-day.two { background: #22c55e; color: #fff; }
        .heatmap-day.future { background: #f3f4f6; color: #9ca3af; }

        .heatmap-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.7rem;
        }

        .heatmap-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .heatmap-legend-box {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        /* History */
        .history {
            background: #fff;
            border-radius: 16px;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .history-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 10px;
        }

        .history-item:last-child { border-bottom: none; }

        .history-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .history-text {
            flex: 1;
            font-size: 0.85rem;
        }

        .history-time {
            font-size: 0.75rem;
            color: #86868b;
        }

        .no-data {
            text-align: center;
            color: #86868b;
            padding: 30px;
            font-size: 0.9rem;
        }

        .clear-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #fff;
            border: none;
            border-radius: 10px;
            color: #86868b;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            touch-action: manipulation;
        }

        .backup-section {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .backup-btn {
            flex: 1;
            padding: 12px;
            background: #fff;
            border: none;
            border-radius: 10px;
            color: #1d1d1f;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            touch-action: manipulation;
        }

        .backup-btn.export {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .backup-btn.import {
            background: #e3f2fd;
            color: #1565c0;
        }

        .import-input {
            display: none;
        }

        .backup-info {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #86868b;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tracker</h1>

        <div class="buttons">
            <button class="btn" id="btn1" data-button="1">
                Frei / Besetzt
                <div class="hint">1x = Frei | 2x = Besetzt | 3x = Löschen</div>
                <span class="cooldown"></span>
            </button>
            <button class="btn" id="btn2" data-button="2">
                Vorne / Hinten
                <div class="hint">1x = Vorne | 2x = Hinten | 3x = Löschen</div>
                <span class="cooldown"></span>
            </button>
            <button class="btn" id="btn3" data-button="3">
                Zapupa
                <div class="hint">1x = Eintrag | 3x = Löschen</div>
                <span class="cooldown"></span>
            </button>
        </div>

        <div class="main-tabs">
            <button class="main-tab active" data-tab="freibesetzt">Frei/Besetzt</button>
            <button class="main-tab" data-tab="vornehinten">Vorne/Hinten</button>
            <button class="main-tab" data-tab="zapupa">Zapupa</button>
        </div>

        <div id="chart-area"></div>

        <div class="history">
            <div class="history-title">Letzte Einträge</div>
            <div id="history-list"></div>
        </div>

        <div class="backup-section">
            <button class="backup-btn export" id="export-btn">Auf GitHub sichern</button>
            <button class="backup-btn import" id="import-btn">Von GitHub laden</button>
            <input type="file" accept=".json" class="import-input" id="import-input">
        </div>
        <div class="backup-info" id="backup-info"></div>

        <button class="clear-btn" id="clear-btn">Alle Daten löschen</button>
    </div>

    <script>
        const COOLDOWN_MS = 5 * 1000;
        const DOUBLE_TAP_MS = 300;
        const TRIPLE_TAP_MS = 500;
        const DAY_START_HOUR = 5;

        const COLORS = {
            green: '#22c55e',
            red: '#ef4444',
            yellow: '#eab308',
            brown: '#92400e'
        };

        let data = JSON.parse(localStorage.getItem('tracker-data') || '[]');
        let lastTaps = {};
        let tapCounts = {};
        let tapTimers = {};
        let currentTab = 'freibesetzt';
        let currentSubTab = 'week';
        let heatmapMonth = new Date();

        function vibrate(pattern = 10) {
            if ('vibrate' in navigator) {
                navigator.vibrate(pattern);
            }
        }

        // Get date key adjusted for 5am day start
        function getAdjustedDateKey(timestamp) {
            const d = new Date(timestamp);
            // Subtract 5 hours - if it's before 5am, it belongs to previous day
            d.setHours(d.getHours() - DAY_START_HOUR);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Get simple date key (no adjustment)
        function getSimpleDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getAdjustedDate(timestamp) {
            const d = new Date(timestamp);
            d.setHours(d.getHours() - DAY_START_HOUR);
            return d;
        }

        // Button events
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => handleTap(btn));
        });

        // Main tab events
        document.querySelectorAll('.main-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                currentSubTab = currentTab === 'vornehinten' ? 'days' :
                               currentTab === 'zapupa' ? 'heatmap' : 'week';
                renderChart();
            });
        });

        // Clear data
        document.getElementById('clear-btn').addEventListener('click', () => {
            if (confirm('Wirklich alle Daten löschen?')) {
                data = [];
                saveData();
                render();
                updateBackupInfo();
            }
        });

        // GitHub config
        const GITHUB_REPO = 'FiniTea/iosBadTracker';
        const BACKUP_PATH = 'backups/tracker-backup.json';

        function getGitHubToken() {
            let token = localStorage.getItem('github-token');
            if (!token) {
                token = prompt('GitHub Personal Access Token eingeben (einmalig):');
                if (token) {
                    localStorage.setItem('github-token', token);
                }
            }
            return token;
        }

        // Export data to GitHub
        document.getElementById('export-btn').addEventListener('click', async () => {
            const token = getGitHubToken();
            if (!token) {
                alert('Kein Token eingegeben.');
                return;
            }

            const exportData = {
                version: 1,
                exportedAt: new Date().toISOString(),
                entries: data
            };

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(exportData, null, 2))));

            try {
                // Get current file SHA (needed for update)
                let sha = null;
                const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${BACKUP_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                }

                // Create or update file
                const putResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${BACKUP_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Backup ${new Date().toISOString()}`,
                        content: content,
                        sha: sha
                    })
                });

                if (putResponse.ok) {
                    localStorage.setItem('tracker-last-export', new Date().toISOString());
                    updateBackupInfo();
                    vibrate([50, 30, 50]);
                    alert('Backup erfolgreich auf GitHub gespeichert!');
                } else {
                    const error = await putResponse.json();
                    throw new Error(error.message || 'GitHub API Fehler');
                }
            } catch (err) {
                alert('Fehler beim GitHub-Backup: ' + err.message);
                // Fallback: lokaler Download
                if (confirm('Lokal speichern stattdessen?')) {
                    downloadLocalBackup(exportData);
                }
            }
        });

        function downloadLocalBackup(exportData) {
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().split('T')[0];
            a.href = url;
            a.download = `tracker-backup-${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            localStorage.setItem('tracker-last-export', new Date().toISOString());
            updateBackupInfo();
        }

        // Import data from GitHub
        document.getElementById('import-btn').addEventListener('click', async () => {
            const token = getGitHubToken();
            if (!token) {
                alert('Kein Token eingegeben.');
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${BACKUP_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        alert('Kein Backup auf GitHub gefunden.');
                    } else {
                        throw new Error('GitHub API Fehler');
                    }
                    return;
                }

                const fileData = await response.json();
                const content = decodeURIComponent(escape(atob(fileData.content)));
                const imported = JSON.parse(content);

                mergeImportedData(imported);
            } catch (err) {
                alert('Fehler beim GitHub-Import: ' + err.message);
            }
        });

        // Local file import (hidden, for backup)
        document.getElementById('import-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    mergeImportedData(imported);
                } catch (err) {
                    alert('Fehler beim Import: ' + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        function mergeImportedData(imported) {
            let entries = [];

            if (Array.isArray(imported)) {
                entries = imported;
            } else if (imported.entries && Array.isArray(imported.entries)) {
                entries = imported.entries;
            } else {
                throw new Error('Ungültiges Format');
            }

            const existingTimestamps = new Set(data.map(d => d.timestamp));
            let newCount = 0;

            entries.forEach(entry => {
                if (entry.timestamp && entry.button && entry.color) {
                    if (!existingTimestamps.has(entry.timestamp)) {
                        data.push(entry);
                        existingTimestamps.add(entry.timestamp);
                        newCount++;
                    }
                }
            });

            data.sort((a, b) => a.timestamp - b.timestamp);
            saveData();
            render();
            updateBackupInfo();

            alert(`Import erfolgreich!\n${newCount} neue Einträge hinzugefügt.\n${entries.length - newCount} Duplikate übersprungen.`);
            vibrate([50, 30, 50]);
        }

        function updateBackupInfo() {
            const info = document.getElementById('backup-info');
            const lastExport = localStorage.getItem('tracker-last-export');
            const hasToken = !!localStorage.getItem('github-token');
            const entryCount = data.length;

            let text = `${entryCount} Einträge`;
            if (lastExport) {
                const date = new Date(lastExport);
                const formatted = date.toLocaleDateString('de-DE', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                text += ` · GitHub-Sync: ${formatted}`;
            } else {
                text += ` · ${hasToken ? 'Noch nicht synchronisiert' : 'GitHub nicht verbunden'}`;
            }
            info.textContent = text;
        }

        function handleTap(btn) {
            const buttonId = btn.dataset.button;
            const now = Date.now();

            if (lastTaps[buttonId] && (now - lastTaps[buttonId]) < COOLDOWN_MS) {
                return;
            }

            vibrate(10);

            if (!tapCounts[buttonId]) tapCounts[buttonId] = { count: 0, firstTap: now };

            if (now - tapCounts[buttonId].firstTap > TRIPLE_TAP_MS) {
                tapCounts[buttonId] = { count: 1, firstTap: now };
            } else {
                tapCounts[buttonId].count++;
            }

            if (tapTimers[buttonId]) {
                clearTimeout(tapTimers[buttonId]);
            }

            tapTimers[buttonId] = setTimeout(() => {
                const count = tapCounts[buttonId].count;
                tapCounts[buttonId] = { count: 0, firstTap: 0 };

                if (count >= 3) {
                    deleteLastEntry(buttonId);
                    flashButton(btn, 'delete');
                    vibrate([20, 50, 20]);
                } else if (count === 2 && buttonId !== '3') {
                    recordEntry(buttonId, 'double');
                } else if (count >= 1) {
                    recordEntry(buttonId, 'single');
                }
            }, DOUBLE_TAP_MS);
        }

        function deleteLastEntry(buttonId) {
            const now = Date.now();
            for (let i = data.length - 1; i >= 0; i--) {
                if (data[i].button === buttonId) {
                    data.splice(i, 1);
                    lastTaps[buttonId] = now;
                    saveData();
                    render();
                    updateCooldowns();
                    return;
                }
            }
        }

        function recordEntry(buttonId, tapType) {
            const now = Date.now();
            let color;

            if (buttonId === '1') {
                color = tapType === 'single' ? 'green' : 'red';
            } else if (buttonId === '2') {
                color = tapType === 'single' ? 'yellow' : 'brown';
            } else {
                color = 'green';
            }

            data.push({ timestamp: now, button: buttonId, color: color });
            lastTaps[buttonId] = now;
            saveData();

            const btn = document.getElementById('btn' + buttonId);
            flashButton(btn, color);

            render();
            updateCooldowns();
        }

        function flashButton(btn, color) {
            btn.classList.add('flash-' + color);
            setTimeout(() => btn.classList.remove('flash-' + color), 300);
        }

        function saveData() {
            localStorage.setItem('tracker-data', JSON.stringify(data));
        }

        function render() {
            renderChart();
            renderHistory();
        }

        function renderChart() {
            const area = document.getElementById('chart-area');

            if (currentTab === 'freibesetzt') {
                area.innerHTML = renderPieChartSection();
            } else if (currentTab === 'vornehinten') {
                area.innerHTML = renderBarChartSection();
            } else {
                area.innerHTML = renderZapupaSection();
            }

            // Attach sub-tab events
            area.querySelectorAll('.sub-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    area.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentSubTab = tab.dataset.sub;
                    renderChart();
                });
            });

            // Heatmap navigation
            area.querySelectorAll('.heatmap-nav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dir = btn.dataset.dir;
                    heatmapMonth.setMonth(heatmapMonth.getMonth() + (dir === 'prev' ? -1 : 1));
                    renderChart();
                });
            });
        }

        function renderPieChartSection() {
            const filtered = filterByTime(data.filter(d => d.button === '1'));
            const green = filtered.filter(d => d.color === 'green').length;
            const red = filtered.filter(d => d.color === 'red').length;
            const total = green + red;

            return `
                <div class="sub-tabs">
                    <button class="sub-tab ${currentSubTab === 'week' ? 'active' : ''}" data-sub="week">Woche</button>
                    <button class="sub-tab ${currentSubTab === 'month' ? 'active' : ''}" data-sub="month">Monat</button>
                    <button class="sub-tab ${currentSubTab === 'all' ? 'active' : ''}" data-sub="all">Gesamt</button>
                </div>
                <div class="chart-container">
                    <div class="chart-title">Frei / Besetzt</div>
                    ${renderTwoColorPie(green, red, 'Frei', 'Besetzt', COLORS.green, COLORS.red)}
                </div>
            `;
        }

        function renderTwoColorPie(val1, val2, label1, label2, color1, color2) {
            const total = val1 + val2;
            if (total === 0) {
                return '<div class="no-data">Keine Daten</div>';
            }

            const pct1 = Math.round((val1 / total) * 100);
            const pct2 = 100 - pct1;
            const angle1 = (val1 / total) * 360;

            const r = 80;
            const cx = 100;
            const cy = 100;
            const labelR = 50; // Radius for label placement

            function polarToCartesian(angle) {
                const rad = (angle - 90) * Math.PI / 180;
                return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
            }

            function labelPos(startAngle, endAngle) {
                const midAngle = (startAngle + endAngle) / 2;
                const rad = (midAngle - 90) * Math.PI / 180;
                return { x: cx + labelR * Math.cos(rad), y: cy + labelR * Math.sin(rad) };
            }

            function describeArc(startAngle, endAngle) {
                if (endAngle - startAngle >= 360) {
                    return `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.01} ${cy-r} A ${r} ${r} 0 1 1 ${cx} ${cy-r} Z`;
                }
                const start = polarToCartesian(endAngle);
                const end = polarToCartesian(startAngle);
                const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
                return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
            }

            let paths = '';
            let labels = '';

            if (val1 > 0 && val2 > 0) {
                paths = `
                    <path d="${describeArc(0, angle1)}" fill="${color1}"/>
                    <path d="${describeArc(angle1, 360)}" fill="${color2}"/>
                `;
                const pos1 = labelPos(0, angle1);
                const pos2 = labelPos(angle1, 360);
                labels = `
                    <text x="${pos1.x}" y="${pos1.y}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="14" font-weight="bold">${pct1}%</text>
                    <text x="${pos2.x}" y="${pos2.y}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="14" font-weight="bold">${pct2}%</text>
                `;
            } else if (val1 > 0) {
                paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color1}"/>`;
                labels = `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="bold">100%</text>`;
            } else {
                paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color2}"/>`;
                labels = `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="bold">100%</text>`;
            }

            return `
                <div class="pie-container">
                    <div class="pie-wrapper">
                        <svg class="pie-svg" viewBox="0 0 200 200">
                            ${paths}
                            ${labels}
                        </svg>
                    </div>
                    <div class="pie-legend">
                        <div class="legend-item">
                            <span class="legend-dot" style="background:${color1}"></span>
                            ${label1}: ${val1} (${pct1}%)
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot" style="background:${color2}"></span>
                            ${label2}: ${val2} (${pct2}%)
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBarChartSection() {
            const filtered = data.filter(d => d.button === '2');
            const yellowCount = filtered.filter(d => d.color === 'yellow').length;
            const brownCount = filtered.filter(d => d.color === 'brown').length;

            return `
                <div class="sub-tabs">
                    <button class="sub-tab ${currentSubTab === 'days' ? 'active' : ''}" data-sub="days">Tage</button>
                    <button class="sub-tab ${currentSubTab === 'weeks' ? 'active' : ''}" data-sub="weeks">Wochen</button>
                    <button class="sub-tab ${currentSubTab === 'months' ? 'active' : ''}" data-sub="months">Monate</button>
                </div>
                <div class="chart-container">
                    <div class="chart-title">Vorne / Hinten</div>
                    ${renderBarChart(filtered, yellowCount, brownCount)}
                </div>
            `;
        }

        function renderBarChart(filtered, totalYellow, totalBrown) {
            if (filtered.length === 0) {
                return '<div class="no-data">Keine Daten</div>';
            }

            let values, labels;

            if (currentSubTab === 'days') {
                const dayData = Array(7).fill(null).map(() => ({ yellow: 0, brown: 0 }));
                filtered.forEach(entry => {
                    const d = getAdjustedDate(entry.timestamp);
                    const day = d.getDay();
                    dayData[day][entry.color]++;
                });
                values = [...dayData.slice(1), dayData[0]];
                labels = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
            } else if (currentSubTab === 'weeks') {
                const weekData = {};
                filtered.forEach(entry => {
                    const d = getAdjustedDate(entry.timestamp);
                    const week = getWeekNumber(d);
                    const key = `${d.getFullYear()}-${String(week).padStart(2, '0')}`;
                    if (!weekData[key]) weekData[key] = { yellow: 0, brown: 0, week };
                    weekData[key][entry.color]++;
                });
                const weeks = Object.entries(weekData).sort((a, b) => a[0].localeCompare(b[0])).slice(-8);
                values = weeks.map(w => w[1]);
                labels = weeks.map(w => `KW${w[1].week}`);
            } else {
                const monthData = {};
                filtered.forEach(entry => {
                    const d = getAdjustedDate(entry.timestamp);
                    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    const monthName = d.toLocaleDateString('de-DE', { month: 'short' });
                    if (!monthData[key]) monthData[key] = { yellow: 0, brown: 0, name: monthName };
                    monthData[key][entry.color]++;
                });
                const months = Object.entries(monthData).sort((a, b) => a[0].localeCompare(b[0])).slice(-6);
                values = months.map(m => m[1]);
                labels = months.map(m => m[1].name);
            }

            if (values.length === 0) {
                return '<div class="no-data">Keine Daten</div>';
            }

            const max = Math.max(...values.map(v => Math.max(v.yellow, v.brown)), 1);
            const yAxisLabels = [max, Math.round(max/2), 0];

            let bars = '';
            values.forEach((v, i) => {
                const yH = (v.yellow / max) * 140;
                const bH = (v.brown / max) * 140;
                bars += `
                    <div class="bar-group">
                        <div class="bar-pair">
                            <div class="bar" style="background:${COLORS.yellow};height:${yH}px"></div>
                            <div class="bar" style="background:${COLORS.brown};height:${bH}px"></div>
                        </div>
                        <div class="bar-label">${labels[i]}</div>
                    </div>
                `;
            });

            return `
                <div class="bar-chart-wrapper">
                    <div class="y-axis">
                        <span>${yAxisLabels[0]}</span>
                        <span>${yAxisLabels[1]}</span>
                        <span>${yAxisLabels[2]}</span>
                    </div>
                    <div class="bar-chart">${bars}</div>
                </div>
                <div class="pie-legend" style="margin-top:15px">
                    <div class="legend-item">
                        <span class="legend-dot" style="background:${COLORS.yellow}"></span>
                        Vorne: ${totalYellow}
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background:${COLORS.brown}"></span>
                        Hinten: ${totalBrown}
                    </div>
                </div>
            `;
        }

        function renderZapupaSection() {
            return `
                <div class="sub-tabs">
                    <button class="sub-tab ${currentSubTab === 'heatmap' ? 'active' : ''}" data-sub="heatmap">Heatmap</button>
                    <button class="sub-tab ${currentSubTab === 'pie' || currentSubTab === 'pie-week' || currentSubTab === 'pie-month' || currentSubTab === 'pie-all' ? 'active' : ''}" data-sub="pie">Statistik</button>
                </div>
                <div class="chart-container">
                    ${currentSubTab.startsWith('pie') ? renderZapupaPie() : renderHeatmap()}
                </div>
            `;
        }

        function renderHeatmap() {
            const year = heatmapMonth.getFullYear();
            const month = heatmapMonth.getMonth();
            const monthName = heatmapMonth.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const today = new Date();
            today.setHours(23, 59, 59, 999);

            // Count entries per day using adjusted keys
            const zapupaData = data.filter(d => d.button === '3');
            const dayCounts = {};
            zapupaData.forEach(entry => {
                const key = getAdjustedDateKey(entry.timestamp);
                dayCounts[key] = (dayCounts[key] || 0) + 1;
            });

            const headers = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
            let grid = headers.map(h => `<div class="heatmap-header">${h}</div>`).join('');

            let startDay = firstDay.getDay() - 1;
            if (startDay < 0) startDay = 6;
            for (let i = 0; i < startDay; i++) {
                grid += '<div class="heatmap-day empty"></div>';
            }

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const date = new Date(year, month, d);
                const key = getSimpleDateKey(date);
                const count = dayCounts[key] || 0;

                let cls = 'zero';
                if (date > today) {
                    cls = 'future';
                } else if (count >= 2) {
                    cls = 'two';
                } else if (count === 1) {
                    cls = 'one';
                }

                grid += `<div class="heatmap-day ${cls}">${d}</div>`;
            }

            return `
                <div class="heatmap-container">
                    <div class="heatmap-nav">
                        <button data-dir="prev">&larr;</button>
                        <span class="heatmap-month">${monthName}</span>
                        <button data-dir="next">&rarr;</button>
                    </div>
                    <div class="heatmap-grid">${grid}</div>
                    <div class="heatmap-legend">
                        <div class="heatmap-legend-item">
                            <span class="heatmap-legend-box" style="background:#fecaca"></span> 0x
                        </div>
                        <div class="heatmap-legend-item">
                            <span class="heatmap-legend-box" style="background:#bbf7d0"></span> 1x
                        </div>
                        <div class="heatmap-legend-item">
                            <span class="heatmap-legend-box" style="background:#22c55e"></span> 2x+
                        </div>
                    </div>
                </div>
            `;
        }

        function renderZapupaPie() {
            const zapupaData = data.filter(d => d.button === '3');

            const dayCounts = {};
            zapupaData.forEach(entry => {
                const key = getAdjustedDateKey(entry.timestamp);
                dayCounts[key] = (dayCounts[key] || 0) + 1;
            });

            const now = new Date();
            let startDate;
            const subTab = currentSubTab;

            if (subTab === 'pie' || subTab === 'pie-week') {
                startDate = new Date(now);
                startDate.setDate(startDate.getDate() - 7);
            } else if (subTab === 'pie-month') {
                startDate = new Date(now);
                startDate.setDate(startDate.getDate() - 30);
            } else {
                if (zapupaData.length > 0) {
                    startDate = new Date(Math.min(...zapupaData.map(e => e.timestamp)));
                    startDate.setHours(startDate.getHours() - DAY_START_HOUR);
                } else {
                    startDate = new Date(now);
                    startDate.setDate(startDate.getDate() - 7);
                }
            }

            let zero = 0, one = 0, two = 0;
            const d = new Date(startDate);
            d.setHours(0, 0, 0, 0);
            const nowEnd = new Date(now);
            nowEnd.setHours(23, 59, 59, 999);

            while (d <= nowEnd) {
                const key = getSimpleDateKey(d);
                const count = dayCounts[key] || 0;
                if (count === 0) zero++;
                else if (count === 1) one++;
                else two++;
                d.setDate(d.getDate() + 1);
            }

            const total = zero + one + two;
            if (total === 0) {
                return '<div class="no-data">Keine Daten</div>';
            }

            return `
                <div class="chart-title">Zapupa Statistik</div>
                <div class="sub-tabs" style="margin-bottom:15px">
                    <button class="sub-tab ${subTab === 'pie' || subTab === 'pie-week' ? 'active' : ''}" data-sub="pie-week">Woche</button>
                    <button class="sub-tab ${subTab === 'pie-month' ? 'active' : ''}" data-sub="pie-month">Monat</button>
                    <button class="sub-tab ${subTab === 'pie-all' ? 'active' : ''}" data-sub="pie-all">Gesamt</button>
                </div>
                ${renderThreeColorPie(zero, one, two, total)}
            `;
        }

        function renderThreeColorPie(zero, one, two, total) {
            const zeroPct = Math.round((zero / total) * 100);
            const onePct = Math.round((one / total) * 100);
            const twoPct = Math.max(0, 100 - zeroPct - onePct);

            const zeroAngle = (zero / total) * 360;
            const oneAngle = (one / total) * 360;
            const twoAngle = (two / total) * 360;

            const r = 80;
            const cx = 100;
            const cy = 100;
            const labelR = 50;

            function polarToCartesian(angle) {
                const rad = (angle - 90) * Math.PI / 180;
                return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
            }

            function labelPos(startAngle, endAngle) {
                const midAngle = (startAngle + endAngle) / 2;
                const rad = (midAngle - 90) * Math.PI / 180;
                return { x: cx + labelR * Math.cos(rad), y: cy + labelR * Math.sin(rad) };
            }

            function describeArc(startAngle, endAngle) {
                if (endAngle - startAngle >= 359.9) {
                    return `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.01} ${cy-r} A ${r} ${r} 0 1 1 ${cx} ${cy-r} Z`;
                }
                const start = polarToCartesian(endAngle);
                const end = polarToCartesian(startAngle);
                const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
                return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
            }

            const colors = ['#fecaca', '#bbf7d0', '#22c55e'];
            const textColors = ['#991b1b', '#166534', '#fff'];
            const segments = [
                { val: zero, pct: zeroPct, angle: zeroAngle, color: colors[0], textColor: textColors[0] },
                { val: one, pct: onePct, angle: oneAngle, color: colors[1], textColor: textColors[1] },
                { val: two, pct: twoPct, angle: twoAngle, color: colors[2], textColor: textColors[2] }
            ].filter(s => s.val > 0);

            let paths = '';
            let labels = '';
            let currentAngle = 0;

            if (segments.length === 1) {
                paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${segments[0].color}"/>`;
                labels = `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="${segments[0].textColor}" font-size="16" font-weight="bold">100%</text>`;
            } else {
                segments.forEach(seg => {
                    const endAngle = currentAngle + seg.angle;
                    paths += `<path d="${describeArc(currentAngle, endAngle)}" fill="${seg.color}"/>`;

                    if (seg.angle > 20) {
                        const pos = labelPos(currentAngle, endAngle);
                        labels += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="middle" fill="${seg.textColor}" font-size="12" font-weight="bold">${seg.pct}%</text>`;
                    }
                    currentAngle = endAngle;
                });
            }

            return `
                <div class="pie-container">
                    <div class="pie-wrapper">
                        <svg class="pie-svg" viewBox="0 0 200 200">
                            ${paths}
                            ${labels}
                        </svg>
                    </div>
                    <div class="pie-legend">
                        <div class="legend-item">
                            <span class="legend-dot" style="background:#fecaca"></span>
                            0x: ${zero} (${zeroPct}%)
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot" style="background:#bbf7d0"></span>
                            1x: ${one} (${onePct}%)
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot" style="background:#22c55e"></span>
                            2x+: ${two} (${twoPct}%)
                        </div>
                    </div>
                </div>
            `;
        }

        function filterByTime(entries) {
            const now = Date.now();
            let cutoff = 0;

            if (currentSubTab === 'week') {
                cutoff = now - 7 * 24 * 60 * 60 * 1000;
            } else if (currentSubTab === 'month') {
                cutoff = now - 30 * 24 * 60 * 60 * 1000;
            }

            return entries.filter(e => e.timestamp >= cutoff);
        }

        function getWeekNumber(d) {
            const date = new Date(d);
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        function renderHistory() {
            const list = document.getElementById('history-list');

            if (data.length === 0) {
                list.innerHTML = '<div class="no-data">Noch keine Einträge</div>';
                return;
            }

            const recent = [...data].reverse().slice(0, 15);

            list.innerHTML = recent.map(entry => {
                const date = new Date(entry.timestamp);
                const time = date.toLocaleString('de-DE', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                let label;
                if (entry.button === '3') {
                    label = 'Zapupa';
                } else if (entry.color === 'green') {
                    label = 'Frei';
                } else if (entry.color === 'red') {
                    label = 'Besetzt';
                } else if (entry.color === 'yellow') {
                    label = 'Vorne';
                } else {
                    label = 'Hinten';
                }

                return `
                    <div class="history-item">
                        <div class="history-dot" style="background:${COLORS[entry.color]}"></div>
                        <div class="history-text">${label}</div>
                        <div class="history-time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        function updateCooldowns() {
            const now = Date.now();

            document.querySelectorAll('.btn').forEach(btn => {
                const buttonId = btn.dataset.button;
                const lastTap = lastTaps[buttonId];
                const cooldownEl = btn.querySelector('.cooldown');

                if (lastTap && (now - lastTap) < COOLDOWN_MS) {
                    const remaining = Math.ceil((COOLDOWN_MS - (now - lastTap)) / 1000);
                    cooldownEl.textContent = `${remaining}s`;
                    btn.classList.add('disabled');
                } else {
                    cooldownEl.textContent = '';
                    btn.classList.remove('disabled');
                }
            });
        }

        setInterval(updateCooldowns, 1000);
        render();
        updateBackupInfo();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
